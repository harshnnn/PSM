server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - http://localhost:4200
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
      routes:
        - id: auth-h2-console
          uri: lb://auth-service
          predicates:
            - Path=/h2/auth/**
          filters:
            - RewritePath=/h2/auth/?(?<segment>.*), /h2-console/$\{segment}
        - id: booking-h2-console
          uri: lb://booking-service
          predicates:
            - Path=/h2/booking/**
          filters:
            - RewritePath=/h2/booking/?(?<segment>.*), /h2-console/$\{segment}
        - id: booking-history-h2-console
          uri: lb://booking-history-service
          predicates:
            - Path=/h2/booking-history/**
          filters:
            - RewritePath=/h2/booking-history/?(?<segment>.*), /h2-console/$\{segment}
        - id: payment-h2-console
          uri: lb://payment-service
          predicates:
            - Path=/h2/payment/**
          filters:
            - RewritePath=/h2/payment/?(?<segment>.*), /h2-console/$\{segment}
        - id: invoice-h2-console
          uri: lb://invoice-service
          predicates:
            - Path=/h2/invoice/**
          filters:
            - RewritePath=/h2/invoice/?(?<segment>.*), /h2-console/$\{segment}
        - id: tracking-h2-console
          uri: lb://tracking-service
          predicates:
            - Path=/h2/tracking/**
          filters:
            - RewritePath=/h2/tracking/?(?<segment>.*), /h2-console/$\{segment}
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
        - id: booking-history-service
          uri: lb://booking-history-service
          predicates:
            - Path=/api/history/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
        - id: invoice-service
          uri: lb://invoice-service
          predicates:
            - Path=/api/invoices/**
        - id: tracking-service
          uri: lb://tracking-service
          predicates:
            - Path=/api/tracking/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
